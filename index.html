<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار مصطلحات كيمياء</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2334;
    --border: #2a3050;
    --accent: #4f8ef7;
    --accent-rgb: 79,142,247;
    --accent-dim: rgba(79,142,247,0.12);
    --correct: #34d399;
    --correct-dim: rgba(52,211,153,0.12);
    --wrong: #f87171;
    --wrong-dim: rgba(248,113,113,0.12);
    --text: #e8ecf4;
    --text-muted: #8b93aa;
    --text-faint: #4a5170;
  }

  body.light-mode {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #eef1f8;
    --border: #d0d7e8;
    --text: #1a1f33;
    --text-muted: #5a6382;
    --text-faint: #9aa3bb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    transition: background 0.3s, color 0.3s;
  }

  .shell {
    width: 100%;
    max-width: 680px;
  }

  /* ===== TOP BAR ===== */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 0.82rem;
    font-family: 'Cairo', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.2s, color 0.2s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Color picker */
  .color-picker-wrap {
    position: relative;
  }
  .color-dots-panel {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    gap: 8px;
    flex-wrap: wrap;
    z-index: 100;
    width: 160px;
  }
  .color-dots-panel.open { display: flex; }
  .color-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.active { border-color: var(--text); }

  /* ===== Header ===== */
  .header {
    margin-bottom: 32px;
    text-align: center;
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }
  .header p { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; }
  .divider {
    width: 48px; height: 2px;
    background: var(--accent);
    margin: 14px auto 0;
    border-radius: 2px;
    transition: background 0.3s;
  }

  /* ===== MODE SELECT ===== */
  #mode-select {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 10px;
  }
  .mode-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    text-align: right;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    font-family: 'Cairo', sans-serif;
  }
  .mode-btn:hover { border-color: var(--accent); background: rgba(var(--accent-rgb),0.06); }
  .mode-btn .mode-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 5px;
  }
  .mode-btn .mode-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .mode-btn .mode-count {
    display: inline-block;
    margin-top: 8px;
    background: rgba(var(--accent-rgb),0.12);
    color: var(--accent);
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ===== Progress bar ===== */
  .progress-wrap {
    display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
  }
  .progress-bar {
    flex: 1; height: 3px; background: var(--border);
    border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 99px; transition: width 0.4s ease, background 0.3s;
  }
  .progress-label {
    font-size: 0.75rem; color: var(--text-muted); white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ===== Score badges ===== */
  .score-row { display: flex; gap: 10px; margin-bottom: 28px; }
  .badge {
    flex: 1; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; text-align: center;
  }
  .badge .val { font-size: 1.3rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .badge .lbl { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
  .badge.correct .val { color: var(--correct); }
  .badge.wrong .val   { color: var(--wrong); }
  .badge.neutral .val { color: var(--accent); }

  /* ===== Card ===== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    transition: border-color 0.25s;
  }
  .card.state-correct { border-color: var(--correct); }
  .card.state-wrong   { border-color: var(--wrong); }

  .card-eyebrow {
    font-size: 0.7rem; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 14px; font-family: 'JetBrains Mono', monospace;
  }
  .definition {
    font-size: 1.1rem; font-weight: 600; line-height: 1.65;
    color: var(--text); margin-bottom: 28px; min-height: 60px;
  }
  .input-row { display: flex; gap: 10px; }

  input[type="text"] {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 13px 16px; font-size: 1rem;
    font-family: 'Cairo', sans-serif; color: var(--text);
    outline: none; transition: border-color 0.2s; direction: rtl;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-faint); }
  input[type="text"]:disabled { opacity: 0.6; }

  .btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 13px 22px; font-size: 0.9rem;
    font-family: 'Cairo', sans-serif; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s; white-space: nowrap;
  }
  .btn:hover  { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn.next { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn.next:hover { border-color: var(--accent); color: var(--accent); }

  /* ===== Feedback ===== */
  .feedback {
    margin-top: 20px; padding: 16px 18px;
    border-radius: 10px; font-size: 0.92rem;
    line-height: 1.6; display: none;
  }
  .feedback.correct {
    display: block; background: var(--correct-dim);
    border: 1px solid rgba(52,211,153,0.3); color: var(--correct);
  }
  .feedback.wrong {
    display: block; background: var(--wrong-dim);
    border: 1px solid rgba(248,113,113,0.3); color: var(--wrong);
  }
  .feedback .answer-label { font-size: 0.75rem; opacity: 0.7; display: block; margin-top: 6px; color: var(--text-muted); }
  .feedback .answer-text  { color: var(--text); font-weight: 600; }

  .hint-icon {
    color: var(--text-faint); font-size: 0.75rem;
    margin-top: 12px; display: flex; align-items: center; gap: 6px;
  }
  .hint-icon svg { flex-shrink: 0; }

  /* ===== Result screen ===== */
  .result-screen { display: none; text-align: center; padding: 40px 28px; }
  .result-screen.show { display: block; }
  .result-big {
    font-size: 3rem; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent); margin-bottom: 8px;
  }
  .result-sub { font-size: 1rem; color: var(--text-muted); margin-bottom: 32px; }
  .result-breakdown { display: flex; justify-content: center; gap: 20px; margin-bottom: 32px; }
  .rb { text-align: center; }
  .rb .rv { font-size: 1.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .rb .rl { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .rb.c .rv { color: var(--correct); }
  .rb.w .rv { color: var(--wrong); }

  .result-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .restart-btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 12px; padding: 14px 28px; font-size: 1rem;
    font-family: 'Cairo', sans-serif; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  .restart-btn:hover { opacity: 0.85; }
  .back-btn {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 28px; font-size: 1rem;
    font-family: 'Cairo', sans-serif; font-weight: 700;
    cursor: pointer; transition: border-color 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* active mode label */
  .mode-label-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 20px;
  }
  .mode-tag {
    background: rgba(var(--accent-rgb),0.12);
    color: var(--accent); border-radius: 6px;
    padding: 3px 10px; font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
  }
  .back-link {
    font-size: 0.78rem; color: var(--text-muted);
    cursor: pointer; text-decoration: underline;
    margin-right: auto;
  }
  .back-link:hover { color: var(--accent); }

  #quiz-area { display: none; }
</style>
</head>
<body>
<div class="shell">

  <!-- TOP BAR -->
  <div class="top-bar">
    <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.8"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span id="theme-label">وضع نهاري</span>
    </button>

    <div class="color-picker-wrap">
      <button class="icon-btn" onclick="toggleColorPanel()">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.8"/>
          <path d="M10 2C10 2 14 6 14 10C14 14 10 18 10 18C10 18 6 14 6 10C6 6 10 2 10 2Z" fill="currentColor" opacity="0.3"/>
        </svg>
        سمة اللون
      </button>
      <div class="color-dots-panel" id="color-panel">
        <div class="color-dot active" style="background:#4f8ef7" data-rgb="79,142,247" data-hex="#4f8ef7" onclick="setAccent(this)"></div>
        <div class="color-dot" style="background:#34d399" data-rgb="52,211,153" data-hex="#34d399" onclick="setAccent(this)"></div>
        <div class="color-dot" style="background:#f59e0b" data-rgb="245,158,11" data-hex="#f59e0b" onclick="setAccent(this)"></div>
        <div class="color-dot" style="background:#f87171" data-rgb="248,113,113" data-hex="#f87171" onclick="setAccent(this)"></div>
        <div class="color-dot" style="background:#a78bfa" data-rgb="167,139,250" data-hex="#a78bfa" onclick="setAccent(this)"></div>
        <div class="color-dot" style="background:#22d3ee" data-rgb="34,211,238" data-hex="#22d3ee" onclick="setAccent(this)"></div>
        <div class="color-dot" style="background:#fb923c" data-rgb="251,146,60" data-hex="#fb923c" onclick="setAccent(this)"></div>
        <div class="color-dot" style="background:#e879f9" data-rgb="232,121,249" data-hex="#e879f9" onclick="setAccent(this)"></div>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <h1>اختبار مصطلحات كيمياء</h1>
    <p>عمل الطالب محمد عبدالوهاب🙂</p>
    <div class="divider"></div>
  </div>

  <!-- MODE SELECT -->
  <div id="mode-select">
    <button class="mode-btn" onclick="startMode('salts')">
      <div class="mode-title">🧪 وحدة الأملاح</div>
      <div class="mode-desc">جميع مصطلحات وحدة الأملاح: التميؤ،المحاليل، المعايرة، ...إلخ</div>
      <span class="mode-count" id="count-salts">-- سؤال</span>
    </button>
    <button class="mode-btn" onclick="startMode('organic')">
      <div class="mode-title">⚗️ الكيمياء العضوية</div>
      <div class="mode-desc">مصطلحات الكيمياء العضوية: الهيدروكربونات الهالوجينية، الكحولات، الألدهيدات والكيتونات</div>
      <span class="mode-count" id="count-organic">-- سؤال</span>
    </button>
    <button class="mode-btn" onclick="startMode('all')">
      <div class="mode-title">📚 المنهج كامل</div>
      <div class="mode-desc">كل مصطلحات وحدة الأملاح + الكيمياء العضوية في اختبار واحد شامل</div>
      <span class="mode-count" id="count-all">-- سؤال</span>
    </button>
  </div>

  <!-- QUIZ AREA -->
  <div id="quiz-area">
    <div class="mode-label-bar">
      <span class="mode-tag" id="active-mode-tag">—</span>
      <span class="back-link" onclick="goHome()">← العودة للقائمة</span>
    </div>

    <div class="score-row">
      <div class="badge correct"><div class="val" id="sc-correct">0</div><div class="lbl">صحيح</div></div>
      <div class="badge wrong"><div class="val" id="sc-wrong">0</div><div class="lbl">خطأ</div></div>
      <div class="badge neutral"><div class="val" id="sc-remain">0</div><div class="lbl">متبقي</div></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="progress-label" id="prog-label">0 / 0</div>
    </div>

    <div class="card" id="main-card">
      <div class="card-eyebrow">التعريف</div>
      <div class="definition" id="definition-text">جاري التحميل...</div>
      <div class="input-row">
        <input type="text" id="answer-input" placeholder="اكتب المصطلح هنا..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn" id="action-btn">تحقق</button>
      </div>
      <div class="feedback" id="feedback-box"></div>
      <div class="hint-icon">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="3" stroke="#4a5170" stroke-width="1.5"/><path d="M8 4v5M8 11v1" stroke="#4a5170" stroke-width="1.5" stroke-linecap="round"/></svg>
        اضغط <strong style="color:var(--text-muted)">Enter</strong> للتحقق، ثم <strong style="color:var(--text-muted)">Enter</strong> مرة أخرى للسؤال التالي
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="result-screen" id="result-screen">
    <div class="result-big" id="res-pct">--%</div>
    <div class="result-sub" id="res-msg">انتهى الاختبار</div>
    <div class="result-breakdown">
      <div class="rb c"><div class="rv" id="res-c">0</div><div class="rl">صحيح</div></div>
      <div class="rb w"><div class="rv" id="res-w">0</div><div class="rl">خطأ</div></div>
    </div>
    <div class="result-btns">
      <button class="restart-btn" onclick="restartSame()">إعادة الاختبار</button>
      <button class="back-btn" onclick="goHome()">القائمة الرئيسية</button>
    </div>
  </div>

</div>

<script>
// ============================================================
// DATA — وحدة الأملاح
// ============================================================
const termsSalts = [
  { def: "مركبات أيونية تتكون من تفاعل الحمض مع القاعدة وتنتج عن اتحاد كاتيون القاعدة وأنيون الحمض.", answers: ["الأملاح","أملاح"] },
  { def: "كاتيون الفلز أو كاتيون الأمونيوم في الملح.", answers: ["الشق القاعدي","شق قاعدي"] },
  { def: "كاتيون فلز أو كاتيون الأمونيوم.", answers: ["كاتيون القاعدة"] },
  { def: "أملاح تتكون نتيجة التفاعل بين حمض قوي وقاعدة قوية.", answers: ["أملاح متعادلة","ملح متعادل"] },
  { def: "أملاح تتكون نتيجة التفاعل بين حمض ضعيف وقاعدة قوية.", answers: ["أملاح قاعدية","ملح قاعدي"] },
  { def: "أملاح تتكون نتيجة التفاعل بين قاعدة ضعيفة وحمض قوي.", answers: ["أملاح حمضية","ملح حمضي"] },
  { def: "أملاح تنتج من تفاعل حمض ضعيف مع قاعدة ضعيفة بحيث يكون Kb للقاعدة أكبر من Ka للحمض.", answers: ["أملاح قاعدية","ملح قاعدي"] },
  { def: "أملاح تنتج من تفاعل حمض ضعيف مع قاعدة ضعيفة بحيث يكون Ka للحمض أكبر من Kb للقاعدة.", answers: ["أملاح حمضية","ملح حمضي"] },
  { def: "أملاح تنتج من تفاعل حمض ضعيف مع قاعدة ضعيفة بحيث يكون Ka للحمض يساوي Kb للقاعدة.", answers: ["أملاح متعادلة","ملح متعادل"] },
  { def: "أملاح يحتوي شقها الحمضي على ذرة هيدروجين بدول.", answers: ["الأملاح الهيدروجينية","أملاح هيدروجينية","ملح هيدروجيني"] },
  { def: "أملاح لا يحتوي شقها الحمضي على هيدروجين بدول.", answers: ["الأملاح غير الهيدروجينية","أملاح غير هيدروجينية"] },
  { def: "تفاعل بين أيونات الملح وجزيئات الماء لتكوين حمض وقاعدة أحدهما أو كلاهما ضعيف.", answers: ["تميؤ الملح","التميؤ","تميؤ"] },
  { def: "محاليل تنتج عند تميؤ ملح حمضي ناتج من تفاعل حمض قوي مع قاعدة ضعيفة.", answers: ["محاليل حمضية","محلول حمضي"] },
  { def: "محاليل تنتج عند تميؤ ملح قاعدي ناتج من تفاعل حمض ضعيف مع قاعدة قوية.", answers: ["محاليل قاعدية","محلول قاعدي"] },
  { def: "محاليل تنتج عن ذوبان ملح متعادل ناتج من تفاعل حمض قوي وقاعدة قوية.", answers: ["محاليل متعادلة","محلول متعادل"] },
  { def: "المحلول الذي يحتوي على أكبر كمية من المذاب عند درجة حرارة معينة، ويكون في حالة اتزان ديناميكي.", answers: ["المحلول المشبع","محلول مشبع"] },
  { def: "المحلول الذي يحتوي على كمية من المادة المذابة أكبر مما في المحلول المشبع عند الظروف ذاتها.", answers: ["المحلول فوق المشبع","محلول فوق المشبع"] },
  { def: "المحلول الذي يحتوي على كمية من المادة المذابة أقل مما في المحلول المشبع عند الظروف ذاتها وله القدرة على إذابة كميات إضافية من المذاب.", answers: ["المحلول غير المشبع","محلول غير مشبع"] },
  { def: "الحالة التي يكون فيها معدل ذوبان المذاب مساوياً تماماً لمعدل ترسبه.", answers: ["الاتزان الديناميكي لذوبان الملح","اتزان ديناميكي","الاتزان الديناميكي"] },
  { def: "كمية المذاب اللازمة لإنتاج محلول مشبع في كمية محددة من المذيب عند درجة حرارة معينة.", answers: ["الذوبانية","ذوبانية"] },

// ============================================================
// STATE
// ============================================================
let queue = [];
let current = null;
let answered = false;
let score = { correct: 0, wrong: 0 };
let total = 0;
let currentMode = null;

// Update counts on page load
document.getElementById('count-salts').textContent   = termsSalts.length   + ' سؤال';
document.getElementById('count-organic').textContent = termsOrganic.length + ' سؤال';
document.getElementById('count-all').textContent     = (termsSalts.length + termsOrganic.length) + ' سؤال';

// ============================================================
// NORMALIZER
// ============================================================
function normalize(str) {
  return str.trim().toLowerCase()
    .replace(/[\u064B-\u065F\u0670]/g, '')
    .replace(/[أإآا]/g, 'ا')
    .replace(/[ةه]/g, 'ه')
    .replace(/[يى]/g, 'ي')
    .replace(/^ال/, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function isMatch(input, answers) {
  const normInput = normalize(input);
  for (const ans of answers) {
    const normAns = normalize(ans);
    if (normInput === normAns) return true;
    const noAl = normAns.replace(/^ال/, '');
    if (normInput === noAl) return true;
    if (normAns.includes(normInput) && normInput.length >= normAns.length * 0.55) return true;
    if (normInput.includes(normAns) && normAns.length >= normInput.length * 0.55) return true;
    if (levenshtein(normInput, normAns) <= Math.floor(Math.max(normInput.length, normAns.length) * 0.25)) return true;
  }
  return false;
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>j===0?i:0));
  for(let j=1;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++)
    for(let j=1;j<=n;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ============================================================
// UI
// ============================================================
function updateScoreboard() {
  document.getElementById('sc-correct').textContent = score.correct;
  document.getElementById('sc-wrong').textContent   = score.wrong;
  document.getElementById('sc-remain').textContent  = queue.length;
  const done = total - queue.length;
  document.getElementById('prog-fill').style.width  = (done/total*100)+'%';
  document.getElementById('prog-label').textContent = done+' / '+total;
}

function showQuestion() {
  if(queue.length===0){ showResult(); return; }
  current = queue[0];
  answered = false;
  const card = document.getElementById('main-card');
  card.className = 'card';
  document.getElementById('definition-text').textContent = current.def;
  const inp = document.getElementById('answer-input');
  inp.value=''; inp.disabled=false; inp.focus();
  document.getElementById('feedback-box').className='feedback';
  document.getElementById('feedback-box').innerHTML='';
  const btn = document.getElementById('action-btn');
  btn.textContent='تحقق'; btn.className='btn';
}

function checkAnswer() {
  if(answered) return;
  const inp = document.getElementById('answer-input');
  const val = inp.value.trim();
  if(!val){ inp.focus(); return; }
  answered=true; inp.disabled=true; queue.shift();
  const correct = isMatch(val, current.answers);
  if(correct) score.correct++; else score.wrong++;
  const card = document.getElementById('main-card');
  card.className='card state-'+(correct?'correct':'wrong');
  const fb = document.getElementById('feedback-box');
  if(correct){
    fb.className='feedback correct';
    fb.innerHTML='&#10003; إجابة صحيحة';
  } else {
    fb.className='feedback wrong';
    fb.innerHTML='&#10007; إجابة خاطئة <span class="answer-label">الإجابة الصحيحة:</span><span class="answer-text"> '+current.answers[0]+'</span>';
  }
  const btn=document.getElementById('action-btn');
  btn.textContent=queue.length===0?'النتيجة':'التالي';
  btn.className='btn next';
  updateScoreboard();
}

function nextOrCheck() {
  if(!answered) checkAnswer(); else showQuestion();
}

function showResult() {
  document.getElementById('quiz-area').style.display='none';
  const rs=document.getElementById('result-screen');
  rs.classList.add('show');
  const pct=Math.round(score.correct/total*100);
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-c').textContent=score.correct;
  document.getElementById('res-w').textContent=score.wrong;
  let msg=pct>=90?'ممتاز! أداء رائع':pct>=70?'جيد جداً، استمر في المراجعة':pct>=50?'مقبول، راجع المصطلحات مجدداً':'تحتاج مراجعة أكثر، لا تستسلم';
  document.getElementById('res-msg').textContent=msg;
}

function startMode(mode) {
  currentMode = mode;
  let data;
  let label;
  if(mode==='salts')  { data=termsSalts;   label='وحدة الأملاح'; }
  else if(mode==='organic') { data=termsOrganic; label='الكيمياء العضوية'; }
  else { data=[...termsSalts,...termsOrganic]; label='المنهج كامل'; }

  document.getElementById('active-mode-tag').textContent = label;
  score={correct:0,wrong:0};
  queue=shuffle(data);
  total=queue.length;
  document.getElementById('mode-select').style.display='none';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-area').style.display='block';
  updateScoreboard();
  showQuestion();
}

function restartSame() {
  document.getElementById('result-screen').classList.remove('show');
  startMode(currentMode);
}

function goHome() {
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('mode-select').style.display='flex';
}

// ============================================================
// THEME
// ============================================================
let isLight = false;
function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light-mode', isLight);
  document.getElementById('theme-label').textContent = isLight ? 'وضع ليلي' : 'وضع نهاري';
}

// ============================================================
// ACCENT COLOR
// ============================================================
let colorPanelOpen = false;
function toggleColorPanel() {
  colorPanelOpen = !colorPanelOpen;
  document.getElementById('color-panel').classList.toggle('open', colorPanelOpen);
}

function setAccent(el) {
  const hex = el.dataset.hex;
  const rgb = el.dataset.rgb;
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-rgb', rgb);
  document.documentElement.style.setProperty('--accent-dim', `rgba(${rgb},0.12)`);
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
  colorPanelOpen = false;
  document.getElementById('color-panel').classList.remove('open');
}

document.addEventListener('click', e => {
  if(!e.target.closest('.color-picker-wrap') && colorPanelOpen) {
    colorPanelOpen = false;
    document.getElementById('color-panel').classList.remove('open');
  }
});

// ============================================================
// EVENTS
// ============================================================
document.getElementById('action-btn').addEventListener('click', nextOrCheck);
document.addEventListener('keydown', e => {
  if(e.key==='Enter'){ e.preventDefault(); nextOrCheck(); }
});

// Init mode select visible
document.getElementById('mode-select').style.display='flex';
document.getElementById('mode-select').style.flexDirection='column';
</script>
